<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Football Arena Pro - Ultimate League</title>
    <style>
        :root {
            --pitch-grass: #1e4620;
            --pitch-stripe: #153416;
            --pitch-line: rgba(255, 255, 255, 0.6);
            --neon-blue: #00f3ff;
            --neon-gold: #ffd700;
            --ui-bg: rgba(11, 15, 26, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #07090e;
            font-family: 'Impact', 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 10px;
        }

        /* Top League UI Bar */
        .league-header {
            width: 95vw;
            max-width: 1200px;
            background: var(--ui-bg);
            border: 2px solid #22314d;
            border-radius: 8px;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .league-title {
            color: var(--neon-gold);
            font-style: italic;
            font-size: 1.2rem;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
        }

        /* Main Game Layout Grid */
        .game-wrapper {
            display: flex;
            width: 95vw;
            max-width: 1200px;
            gap: 15px;
            height: calc(100vh - 150px);
        }

        /* Stadium Field Setup */
.stadium-container {
    flex: 1;
    background: linear-gradient(to bottom, var(--pitch-grass), var(--pitch-stripe)); /* <-- CHANGE THIS LINE */
    background-size: 100% 10%; /* Creates lawn stripes */
}

        /* Realistic Anime Grass Texture Mask */
        .anime-grass-overlay {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0.15;
            background-image: repeating-linear-gradient(45deg, #000 0px, #000 2px, transparent 2px, transparent 10px);
            pointer-events: none;
        }

        .pitch-lines {
            position: absolute; top: 3%; left: 3%; right: 3%; bottom: 3%;
            border: 2px solid var(--pitch-line); pointer-events: none;
        }
        .midfield-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--pitch-line); }
        .center-circle { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; border: 2px solid var(--pitch-line); border-radius: 50%; transform: translate(-50%, -50%); }
        .penalty-box-l { position: absolute; left: 0; top: 25%; width: 12%; height: 50%; border: 2px solid var(--pitch-line); border-left: none; }
        .penalty-box-r { position: absolute; right: 0; top: 25%; width: 12%; height: 50%; border: 2px solid var(--pitch-line); border-right: none; }
        .goal { position: absolute; top: 40%; width: 15px; height: 20%; background: rgba(255,255,255,0.1); border: 2px solid #fff; z-index: 2; }
        .goal-l { left: 1%; border-right: none; }
        .goal-r { right: 1%; border-left: none; }

        /* Control Panels Side Menu */
        .control-side-panel {
            width: 280px;
            background: var(--ui-bg);
            border: 2px solid #22314d;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .panel-section { width: 100%; text-align: center; }
        .panel-section h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; letter-spacing: 1px; }

        /* Tactical Action Command Grid */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-cmd {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #fff;
            border: 2px solid #334155;
            padding: 12px 5px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-cmd:hover, .btn-cmd.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0,243,255,0.4);
            background: #14253d;
        }

        /* Ability Sub-Menu */
        .ability-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 5px;
            max-height: 140px;
            overflow-y: auto;
            width: 100%;
        }
        .btn-ability {
            width: 100%;
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px;
            margin: 4px 0;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-ability:hover { background: #dc2626; }
        .btn-ability.nika-glow {
            background: linear-gradient(45deg, #fff, #ffd700);
            color: #000;
            animation: nika-shimmer 1s infinite alternate;
        }

        /* Virtual Joystick Canvas System */
        .joystick-wrapper {
            width: 130px; height: 130px;
            background: radial-gradient(circle, #1e293b 40%, #0b0f19 100%);
            border: 3px solid #334155;
            border-radius: 50%;
            position: relative;
            margin: 10px auto;
            touch-action: none;
        }
        .joystick-thumb {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--neon-blue), #0284c7);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,243,255,0.5);
            cursor: grab;
        }

        /* Anime Accurate Character Design Configs */
        .player {
            position: absolute;
            width: 52px; height: 52px;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            justify-content: center; align-items: center;
            transition: transform 0.1s linear;
        }
        .player.selected {
            outline: 3px dashed var(--neon-gold);
            outline-offset: 4px;
        }

        /* Jersey Numbers */
        .jersey-number {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: var(--neon-gold);
            border: 1px solid var(--neon-gold);
            font-size: 0.65rem;
            padding: 0px 4px;
            border-radius: 3px;
            font-weight: bold;
        }

        .avatar-art {
            width: 44px; height: 44px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 2px solid #fff;
            background: #ffdbac; /* Face tone */
        }

        /* High Fidelity CSS Polygon Hair Design */
        .hair-goku { background: #000; width: 100%; height: 50%; position: absolute; top: 0; clip-path: polygon(10% 60%, 25% 10%, 40% 45%, 55% 0%, 70% 45%, 90% 10%, 100% 70%, 50% 30%); }
        .hair-vegeta { background: #000; width: 100%; height: 60%; position: absolute; top: 0; clip-path: polygon(0% 100%, 15% 15%, 35% 40%, 50% 0%, 65% 40%, 85% 15%, 100% 100%); }
        .hat-luffy { background: #eab308; width: 120%; height: 35%; position: absolute; top: 10%; left: -10%; border-radius: 50% 50% 0 0; box-shadow: inset 0 -6px 0 #ef4444; }
        .hair-ichigo { background: #f97316; width: 100%; height: 50%; position: absolute; top: 0; clip-path: polygon(0 50%, 20% 10%, 45% 45%, 60% 5%, 80% 45%, 100% 15%, 100% 100%, 0 100%); }

        /* Nika Form Aesthetic Evolution Override */
        .player.nika-mode .avatar-art { background: #f8fafc; border-color: var(--neon-blue); }
        .player.nika-mode .hat-luffy { background: #fff; box-shadow: inset 0 -6px 0 #cbd5e1; border-radius: 40%; transform: scale(1.1); }
        .player.nika-mode .aura { background: radial-gradient(circle, rgba(255,255,255,0.8) 20%, rgba(14,165,233,0.4) 60%, transparent 70%) !important; animation: nika-pulse 0.5s infinite alternate; }

        .aura {
            position: absolute; width: 140%; height: 140%; border-radius: 50%;
            opacity: 0.5; mix-blend-mode: screen; pointer-events: none; z-index: -1;
        }
        #p-goku .aura { background: radial-gradient(circle, #f59e0b 50%, transparent 70%); }
        #p-vegeta .aura { background: radial-gradient(circle, #3b82f6 50%, transparent 70%); }
        #p-luffy .aura { background: radial-gradient(circle, #ef4444 50%, transparent 70%); }
        #p-ichigo .aura { background: radial-gradient(circle, #a855f7 50%, transparent 70%); }

        .player-name {
            position: absolute; bottom: -18px; background: rgba(0,0,0,0.85);
            padding: 1px 5px; border-radius: 3px; font-size: 0.6rem; white-space: nowrap;
            border: 1px solid #475569;
        }

        /* Match Ball Asset */
        .football {
            position: absolute; width: 22px; height: 22px;
            background: #ffffff;
            background-image: radial-gradient(circle at 35% 35%, #fff 0%, #a1a1aa 50%, #27272a 100%);
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            z-index: 12; pointer-events: none;
        }

        /* HUD Action Notification Banner */
        .action-banner {
            position: absolute; top: 12%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(7, 9, 14, 0.95); border: 3px solid var(--neon-gold);
            padding: 8px 25px; font-size: 1.4rem; color: #fff; text-shadow: 0 0 8px var(--neon-blue);
            font-style: italic; border-radius: 6px; z-index: 100; transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .action-banner.show { transform: translate(-50%, -50%) scale(1); }

        @keyframes nika-shimmer { 0% { box-shadow: 0 0 5px #fff; } 100% { box-shadow: 0 0 15px #ffd700; } }
        @keyframes nika-pulse { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.15); opacity: 0.7; } }
    </style>
</head>
<body>

    <!-- Match Information Context Header -->
    <div class="league-header">
        <div class="league-title" id="display-league">JAPAN SHONEN LEAGUE</div>
        <div id="display-round" style="font-size: 1rem; font-weight: bold;">ROUND: 1 / 5</div>
        <div id="display-score" style="letter-spacing: 1px; color: var(--neon-blue);">TEAM HERO: 0 | ENEMY: 0</div>
    </div>

    <!-- Main Game Window Block Arena layout -->
    <div class="game-wrapper">
        
        <!-- Field Canvas Field Container Area -->
        <div class="stadium-container" id="stadium">
            <div class="anime-grass-overlay"></div>
            <div class="action-banner" id="banner">MATCH START!</div>
            
            <div class="pitch-lines">
                <div class="midfield-line"></div>
                <div class="center-circle"></div>
                <div class="penalty-box-l"></div>
                <div class="penalty-box-r"></div>
                <div class="goal goal-l"></div>
                <div class="goal goal-r"></div>
            </div>

            <!-- Physics-Driven Match Ball Asset -->
            <div class="football" id="match-ball"></div>

            <!-- Goku Asset -->
            <div class="player selected" id="p-goku" onclick="selectHero('goku')">
                <div class="jersey-number">№ 10</div>
                <div class="aura"></div>
                <div class="avatar-art">
                    <div class="hair-goku"></div>
                </div>
                <div class="player-name">GOKU</div>
            </div>

            <!-- Vegeta Asset -->
            <div class="player" id="p-vegeta" onclick="selectHero('vegeta')">
                <div class="jersey-number">№ 7</div>
                <div class="aura"></div>
                <div class="avatar-art">
                    <div class="hair-vegeta"></div>
                </div>
                <div class="player-name">VEGETA</div>
            </div>

            <!-- Luffy Asset -->
            <div class="player" id="p-luffy" onclick="selectHero('luffy')">
                <div class="jersey-number">№ 5</div>
                <div class="aura"></div>
                <div class="avatar-art">
                    <div class="hat-luffy"></div>
                </div>
                <div class="player-name">LUFFY</div>
            </div>

            <!-- Ichigo Asset -->
            <div class="player" id="p-ichigo" onclick="selectHero('ichigo')">
                <div class="jersey-number">№ 11</div>
                <div class="aura"></div>
                <div class="avatar-art">
                    <div class="hair-ichigo"></div>
                </div>
                <div class="player-name">ICHIGO</div>
            </div>
        </div>

        <!-- Tactical Console Engine Side Panel Control Area -->
        <div class="control-side-panel">
            
            <!-- Strategic Engine Options Block Matrix -->
            <div class="panel-section">
                <h3>TACTICAL UNIT CONTROL</h3>
                <div class="action-grid">
                    <button class="btn-cmd active" id="cmd-dribble" onclick="setPlayMode('dribble')">🏃 Dribble</button>
                    <button class="btn-cmd" id="cmd-pass" onclick="executePlayAction('pass')">🤝 Pass</button>
                    <button class="btn-cmd" id="cmd-shoot" onclick="executePlayAction('shoot')">🚀 Shoot</button>
                    <button class="btn-cmd" id="cmd-skill" onclick="setPlayMode('skill')">⚡ Skills</button>
                </div>
            </div>

            <!-- Character Ability Execution Submenus Frame -->
            <div class="panel-section">
                <h3 id="ability-title">GOKU ABILITIES</h3>
                <div class="ability-box" id="abilities-container">
                    <!-- Dynamic standard loading injected through modern Engine -->
                </div>
            </div>

            <!-- Virtual Joystick Input Node -->
            <div class="panel-section">
                <h3>STEER UNIT DIRECTION</h3>
                <div class="joystick-wrapper" id="joy-zone">
                    <div class="joystick-thumb" id="joy-thumb"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Game Metrics & State Management Config Map Matrix
        let activeHero = 'goku';
        let currentMode = 'dribble'; // Global tactical modifier switch state setup
        let currentLeagueIndex = 0;
        let currentRound = 1;
        let score = 0;

        const leagueList = [
            "JAPAN SHONEN LEAGUE",
            "GRAND LINE CHAMPIONSHIP",
            "SUPER SAIYAN PREMIER",
            "MULTIVERSE WORLD CUP"
        ];

        // Coordinate positions inside the arena field maps configuration 
        const coordinates = {
            goku: { x: 20, y: 25 },
            vegeta: { x: 20, y: 65 },
            luffy: { x: 40, y: 30 },
            ichigo: { x: 40, y: 60 },
            ball: { x: 50, y: 50 }
        };

        // Ability sets per character framework 
        const heroAbilities = {
            goku: [
                { name: "Kamehameha Wave Kick", action: () => forceBallStrike(94, 50, "KAMEHAMEHA SHOOT! 💥") },
                { name: "Kaioken Dash Burst", action: () => boostActiveHeroSpeed(2) }
            ],
            vegeta: [
                { name: "Final Flash Strike", action: () => forceBallStrike(94, 45, "FINAL FLASH GOAL! ⚡") },
                { name: "Galick Gun Cross Pass", action: () => executePlayAction('pass') }
            ],
            luffy: [
                { name: "Gum Gum Pistol Shot", action: () => forceBallStrike(94, Math.random()*20+40, "GUM GUM PISTOL! 🥊") },
                { name: "Gum Gum Elephant Punch", action: () => forceBallStrike(94, 50, "ELEPHANT STRIKE! 🐘") },
                { name: "Sun God Nika Form", action: () => transformToNika() }
            ],
            ichigo: [
                { name: "Getsuga Tensho Drive", action: () => forceBallStrike(94, 52, "GETSUGA SHOT! ⚔️") },
                { name: "Shunpo Teleport Steal", action: () => { coordinates.ball.x = coordinates.ichigo.x + 2; coordinates.ball.y = coordinates.ichigo.y; triggerNotification("SHUNPO FLICK!"); }}
            ]
        };

        // Joystick Vectors and Physics Coordinates
        let joyVector = { x: 0, y: 0 };
        let isJoystickActive = false;
        const speedScale = 0.6; // Balance factor for high accuracy physics scaling 
        let ballPossession = true;

        // Elements caching operations
        const ballEl = document.getElementById('match-ball');
        const bannerEl = document.getElementById('banner');
        const joyThumb = document.getElementById('joy-thumb');
        const joyZone = document.getElementById('joy-zone');

        function updatePositions() {
            // Update positions on field
            for (let entity in coordinates) {
                const targetEl = entity === 'ball' ? ballEl : document.getElementById(`p-${entity}`);
                if (targetEl) {
                    targetEl.style.left = coordinates[entity].x + '%';
                    targetEl.style.top = coordinates[entity].y + '%';
                }
            }

            // Magnetic Ball-to-Player Possession Check loop logic
            let heroCoords = coordinates[activeHero];
            let dx = coordinates.ball.x - heroCoords.x;
            let dy = coordinates.ball.y - heroCoords.y;
            let distance = Math.sqrt(dx*dx + dy*dy);

            if (currentMode === 'dribble' && distance < 6) {
                ballPossession = true;
                // Ball glides seamlessly offset slightly in front of active player
                coordinates.ball.x = heroCoords.x + 3;
                coordinates.ball.y = heroCoords.y + 2;
            } else {
                ballPossession = false;
            }

            // Check goal line scoring mechanism logic frame context 
            if (coordinates.ball.x >= 94 && coordinates.ball.y >= 38 && coordinates.ball.y <= 62) {
                processGoalScored();
            }
        }

        function selectHero(name) {
            activeHero = name;
            document.querySelectorAll('.player').forEach(p => p.classList.remove('selected'));
            document.getElementById(`p-${name}`).classList.add('selected');
            
            // Re-render sub-menus panel interface context layout
            document.getElementById('ability-title').innerText = `${name.toUpperCase()} ABILITIES`;
            renderAbilitiesMenu(name);
            triggerNotification(`${name.toUpperCase()} Controls Activated!`);
        }

        function renderAbilitiesMenu(name) {
            const container = document.getElementById('abilities-container');
            container.innerHTML = "";
            heroAbilities[name].forEach(ability => {
                const btn = document.createElement('button');
                btn.className = "btn-ability";
                if (ability.name.includes("Nika")) btn.classList.add('nika-glow');
                btn.innerText = ability.name;
                btn.onclick = () => {
                    ability.action();
                };
                container.appendChild(btn);
            });
        }

        function setPlayMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn-cmd').forEach(b => b.classList.remove('active'));
            document.getElementById(`cmd-${mode}`).classList.add('active');
            triggerNotification(`Mode changed to: ${mode.toUpperCase()}`);
        }

        function executePlayAction(type) {
            if (type === 'pass') {
                let options = Object.keys(coordinates).filter(k => k !== 'ball' && k !== activeHero);
                let passTarget = options[Math.floor(Math.random() * options.length)];
                triggerNotification(`${activeHero.toUpperCase()} Precision Pass to ${passTarget.toUpperCase()}!`);
                coordinates.ball.x = coordinates[passTarget].x;
                coordinates.ball.y = coordinates[passTarget].y;
                selectHero(passTarget);
            } else if (type === 'shoot') {
                triggerNotification(`${activeHero.toUpperCase()} Fires at Goal! 🔥`);
                forceBallStrike(94, 42 + Math.random() * 16, "STRIKE!");
            }
        }

        function forceBallStrike(tx, ty, msg) {
            coordinates.ball.x = tx;
            coordinates.ball.y = ty;
            triggerNotification(msg);
            updatePositions();
        }

        function boostActiveHeroSpeed(multiplier) {
            triggerNotification(`${activeHero.toUpperCase()} Speed Blitz! ⚡`);
            // Immediate structural projection down the baseline
            coordinates[activeHero].x += 10;
            updatePositions();
        }

        function transformToNika() {
            const luffyCard = document.getElementById('p-luffy');
            luffyCard.classList.add('nika-mode');
            triggerNotification("GEAR 5! SUN GOD NIKA AWAKENED! ☀️");
            // Empower properties 
            heroAbilities.luffy.unshift({
                name: "Gum Gum Bajrang Gun",
                action: () => forceBallStrike(94, 50, "BAJRANG OMNIPOTENT GOAL!!! 🪐")
            });
            renderAbilitiesMenu('luffy');
        }

        function triggerNotification(msg) {
            bannerEl.innerText = msg;
            bannerEl.classList.add('show');
            setTimeout(() => bannerEl.classList.remove('show'), 1400);
        }

        function processGoalScored() {
            score += 1;
            document.getElementById('display-score').innerText = `TEAM HERO: ${score} | ENEMY: 0`;
            triggerNotification("GOAL!!! HEROES SCORE! ⚽");
            
            setTimeout(() => {
                currentRound += 1;
                if (currentRound > 5) {
                    currentRound = 1;
                    currentLeagueIndex = (currentLeagueIndex + 1) % leagueList.length;
                    document.getElementById('display-league').innerText = leagueList[currentLeagueIndex];
                }
                document.getElementById('display-round').innerText = `ROUND: ${currentRound} / 5`;
                resetPitchPositions();
            }, 1500);
        }

        function resetPitchPositions() {
            coordinates.goku = { x: 20, y: 25 };
            coordinates.vegeta = { x: 20, y: 65 };
            coordinates.luffy = { x: 40, y: 30 };
            coordinates.ichigo = { x: 40, y: 60 };
            coordinates.ball = { x: 50, y: 50 };
            updatePositions();
        }

        /* Virtual Stick Vector Controller Physics Core */
        joyZone.addEventListener('mousedown', (e) => startJoystick(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => processJoystickMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', endJoystick);

        joyZone.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startJoystick(touch.clientX, touch.clientY);
        });
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            processJoystickMove(touch.clientX, touch.clientY);
        }, { passive: false });
        window.addEventListener('touchend', endJoystick);

        function startJoystick(cx, cy) {
            isJoystickActive = true;
        }

        function processJoystickMove(cx, cy) {
            if (!isJoystickActive) return;
            const rect = joyZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = cx - centerX;
            let deltaY = cy - centerY;
            let distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            const maxRadius = rect.width / 2 - 10;

            if (distance > maxRadius) {
                deltaX = (deltaX / distance) * maxRadius;
                deltaY = (deltaY / distance) * maxRadius;
                distance = maxRadius;
            }

            joyThumb.style.left = `calc(50% + ${deltaX}px)`;
            joyThumb.style.top = `calc(50% + ${deltaY}px)`;

            // Normalize vector direction mapping matrix values
            joyVector.x = deltaX / maxRadius;
            joyVector.y = deltaY / maxRadius;
        }

        function endJoystick() {
            isJoystickActive = false;
            joyThumb.style.left = '50%';
            joyThumb.style.top = '50%';
            joyVector = { x: 0, y: 0 };
        }

        // Processing Continuous Frame Refresh Loop operations 
        function stepPhysicsLoop() {
            if (isJoystickActive) {
                let targetHero = coordinates[activeHero];
                // Move player based on joystick values
                targetHero.x += joyVector.x * speedScale;
                targetHero.y += joyVector.y * speedScale;

                // Boundary containment constraints checks
                if (targetHero.x < 4) targetHero.x = 4;
                if (targetHero.x > 94) targetHero.x = 94;
                if (targetHero.y < 4) targetHero.y = 4;
                if (targetHero.y > 94) targetHero.y = 94;
            }
            updatePositions();
            requestAnimationFrame(stepPhysicsLoop);
        }

        // Initialize Application Context Engine Hook setup
        window.onload = () => {
            renderAbilitiesMenu('goku');
            resetPitchPositions();
            stepPhysicsLoop();
        };
    </script>
</body>
</html>
